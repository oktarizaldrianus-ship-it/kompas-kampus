<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Tes Pelatihan — Kompas Kampus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #fbf8f0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
        }
        .tes-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }
        .tes-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 36px 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.04);
            border: 1px solid #f0ebe1;
        }
        .soal-box {
            background: #fcfaf7;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 18px;
            border-left: 5px solid #d4c5b0;
            transition: 0.2s;
        }
        .soal-box:hover {
            background: #f8f5f0;
        }
        .badge-soal {
            background: #e5ddd0;
            color: #2c3e4f;
            font-weight: 600;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin-right: 12px;
        }
        .form-check-input:checked {
            background-color: #b8a68b;
            border-color: #b8a68b;
        }
        .btn-primary {
            background: #d4c5b0;
            border: none;
            border-radius: 60px;
            padding: 12px 40px;
            font-weight: 600;
            color: #1f2a33;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #c5b49c;
            transform: scale(1.02);
        }
        .btn-outline-cozy {
            border: 1.5px solid #d4c5b0;
            color: #5a4f3e;
            border-radius: 40px;
            padding: 6px 20px;
            transition: 0.2s;
            background: transparent;
            text-decoration: none;
        }
        .btn-outline-cozy:hover {
            background: #d4c5b0;
            color: #fff;
        }
        .login-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #fbf8f0;
            z-index:9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 40px 36px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid #f0ebe1;
        }
        .score-display {
            font-size: 3rem;
            font-weight: 700;
            color: #2c3e4f;
        }
        #resultArea {
            display: none;
        }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card text-center">
        <i class="fas fa-compass" style="font-size:2.5rem; color:#d4c5b0;"></i>
        <h3 class="mt-2">Akses Tes Pelatihan</h3>
        <p class="text-muted">Masukkan kata sandi Guru BK</p>
        <input type="password" id="loginPassword" class="form-control" placeholder="Kata Sandi">
        <button id="loginBtn" class="btn-primary mt-3">Masuk</button>
        <div id="loginError" class="mt-2 text-danger" style="display:none;">❌ Password salah.</div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">
    <div class="tes-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-pencil-alt"></i> Tes Pemahaman Guru BK</h2>
            <div>
                <a href="/dashboard.html" class="btn-outline-cozy me-2"><i class="fas fa-arrow-left"></i> Dashboard</a>
                <button class="btn-outline-cozy" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </div>

        <div class="tes-card">
            <!-- IDENTITAS GURU -->
            <div class="mb-4">
                <label class="form-label fw-bold">Nama Guru <span class="text-danger">*</span></label>
                <input type="text" id="teacherName" class="form-control" placeholder="Masukkan nama lengkap Anda" required style="border-radius:30px;">
                <small class="text-muted">Nama ini akan muncul di laporan trainer.</small>
            </div>

            <!-- Jenis Tes -->
            <div class="mb-4 p-3" style="background:#f8f5f0; border-radius:20px;">
                <label class="fw-bold me-3">Jenis Tes:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="testType" id="preTest" value="pre" checked>
                    <label class="form-check-label fw-bold" for="preTest">Pre-Test (Sebelum Pelatihan)</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="testType" id="postTest" value="post">
                    <label class="form-check-label fw-bold" for="postTest">Post-Test (Setelah Pelatihan)</label>
                </div>
            </div>

            <form id="tesForm">
                <div id="soalContainer"></div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-paper-plane"></i> Kirim Jawaban</button>
                </div>
            </form>

            <!-- HASIL -->
            <div id="resultArea" class="mt-4 text-center">
                <div class="p-4" style="background:#f0ebe1; border-radius:24px;">
                    <i class="fas fa-check-circle fa-3x text-success"></i>
                    <h4 class="mt-2">Tes Selesai!</h4>
                    <div class="score-display" id="scoreDisplay">0</div>
                    <p class="text-muted">Skor Anda dari 100</p>
                    <button id="resetBtn" class="btn btn-outline-secondary mt-2" style="border-radius:40px;">Kembali ke Awal</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function() {
        'use strict';

        // ---------- 10 SOAL PILIHAN GANDA ----------
        const questions = [
            { id:1, text:'Apa yang dimaksud dengan "Intention-Behavior Gap" dalam konteks bimbingan karir?', options:['Perbedaan antara cita-cita dan bakat siswa','Kesenjangan antara niat melanjutkan pendidikan dengan tindakan pendaftaran nyata','Jarak antara rumah siswa dan perguruan tinggi','Perbedaan skor sikap dan norma subjektif'], correct:1 },
            { id:2, text:'Menurut Theory of Planned Behavior (Ajzen), niat perilaku siswa dipengaruhi oleh tiga hal berikut, KECUALI...', options:['Sikap (Attitude) terhadap kuliah','Norma Subjektif (Subjective Norm) dari orang terdekat','Persepsi Kontrol Perilaku (PBC) terhadap proses pendaftaran','Tingkat pengenalan terhadap merek kampus (Brand Awareness)'], correct:3 },
            { id:3, text:'Seorang siswa mengatakan: "Saya ingin kuliah, tetapi saya bingung caranya daftar dan takut biayanya mahal." Hambatan psikologis utama yang dialami siswa tersebut adalah...', options:['Sikap Negatif terhadap Kuliah','Kurangnya Dukungan Orang Tua (Norma)','Rendahnya Keyakinan Kemampuan Diri (PBC)','Kurangnya Informasi tentang Kampus'], correct:2 },
            { id:4, text:'Seorang siswa sudah mengenal baik sebuah kampus (sering melihat iklan dan testimoni). Hal ini paling memengaruhi aspek psikologisnya yaitu...', options:['Membentuk sikap positif dan mengurangi rasa takut akan hambatan','Langsung memutuskan untuk mendaftar tanpa berpikir panjang','Membuatnya mengabaikan nasihat orang tua','Hanya membuatnya bangga, tanpa pengaruh pada keputusan'], correct:0 },
            { id:5, text:'Ketika menghadapi siswa yang sangat ingin kuliah tetapi terkendala masalah biaya, pendekatan intervensi yang paling tepat adalah...', options:['Menyuruhnya bekerja dulu dan menabung','Memberikan informasi beasiswa dan pendampingan administrasi','Memintanya memilih kampus yang lebih murah','Mengabaikannya karena bukan wewenang Guru BK'], correct:1 },
            { id:6, text:'Seorang siswa dengan tegas menjawab "Tidak" ketika ditanya apakah bersedia dihubungi via WhatsApp. Sikap terbaik yang harus dilakukan Guru BK adalah...', options:['Tetap menghubungi karena itu demi kebaikannya','Menghormati keputusannya dan tidak mengirim pesan pribadi, tetapi tetap memasukkannya ke dalam database informasi','Menghapus datanya karena dianggap tidak kooperatif','Menghubungi orang tuanya sebagai gantinya'], correct:1 },
            { id:7, text:'Prinsip "Timely" dalam framework EAST (Easy, Attractive, Social, Timely) berarti...', options:['Pesan harus menggunakan bahasa yang mudah dipahami','Pesan harus dikirim pada waktu yang tepat, misalnya pagi atau sore hari','Pesan harus menarik secara visual','Pesan harus menunjukkan bahwa banyak siswa lain juga melakukannya'], correct:1 },
            { id:8, text:'Berdasarkan behavioral insight, waktu terbaik mengirimkan pesan pengingat (nudge) kepada siswa agar efektif adalah...', options:['Tengah malam agar tidak mengganggu aktivitas belajar','Pagi hari (08.00) atau sore hari (15.00)','Hanya di akhir pekan','Setiap hari secara acak'], correct:1 },
            { id:9, text:'Skenario: Andi memiliki Sikap=5, Dukungan Orang Tua=5, Keyakinan Mengurus Pendaftaran=2. Profil Andi yang paling tepat adalah...', options:['SIAP MELUNCUR (Ready-to-Go)','PEJUANG POTENSIAL (Terhalang Biaya/Teknis)','PEJUANG RESTU (Butuh Dukungan Keluarga)','PEMILIH BERKUALITAS (Ragu akan Nilai Kampus)'], correct:1 },
            { id:10, text:'Skenario: Budi memiliki Keyakinan Mengurus Pendaftaran=5, Sikap=2, Niat=2. Strategi intervensi paling tepat adalah...', options:['Kirim link pendaftaran dan minta segera daftar (Closing)','Tawarkan beasiswa dan bantuan biaya (Solusi Finansial)','Tampilkan fasilitas, prestasi, dan profil lulusan (Value Proposition)','Libatkan orang tua untuk memberi dukungan (Social Proof)'], correct:2 }
        ];

        function renderQuestions() {
            const container = document.getElementById('soalContainer');
            let html = '';
            questions.forEach((q, idx) => {
                html += `<div class="soal-box">`;
                html += `<div class="mb-2"><span class="badge-soal">Soal ${idx+1}</span> <strong>${q.text}</strong></div>`;
                q.options.forEach((opt, optIdx) => {
                    const name = `q${q.id}`;
                    const id = `q${q.id}_${optIdx}`;
                    html += `
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="${name}" id="${id}" value="${optIdx}" required>
                            <label class="form-check-label" for="${id}">
                                ${String.fromCharCode(65 + optIdx)}. ${opt}
                            </label>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function calculateScore() {
            let correct = 0;
            questions.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) correct++;
            });
            return Math.round((correct / questions.length) * 100);
        }

        async function saveScore(score, testType, teacherName) {
            const password = localStorage.getItem('kompas_password') || window._password;
            if (!teacherName.trim()) {
                alert('Nama guru wajib diisi!');
                return false;
            }
            const payload = { teacherName, testType, score, timestamp: new Date().toISOString() };
            try {
                const res = await fetch('/.netlify/functions/save-test-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Gagal simpan');
                return true;
            } catch (err) {
                alert('Skor berhasil dihitung, tetapi gagal menyimpan ke server. Hubungi tim lab.');
                return false;
            }
        }

        // ---------- LOGIN ----------
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const pwd = document.getElementById('loginPassword').value;
            const res = await fetch('/.netlify/functions/get-responses', {
                headers: { 'x-admin-password': pwd }
            });
            if (res.status === 401) {
                document.getElementById('loginError').style.display = 'block';
            } else {
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                window._password = pwd;
                localStorage.setItem('kompas_password', pwd);
                renderQuestions();
            }
        });
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('logoutBtn').addEventListener('click', function() {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loginPassword').value = '';
            localStorage.removeItem('kompas_password');
        });

        // ---------- SUBMIT ----------
        document.getElementById('tesForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const teacherName = document.getElementById('teacherName').value.trim();
            if (!teacherName) { alert('Masukkan nama guru terlebih dahulu!'); return; }

            let allAnswered = true;
            questions.forEach(q => {
                const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (!checked) {
                    allAnswered = false;
                    const box = document.querySelector(`input[name="q${q.id}"]`)?.closest('.soal-box');
                    if (box) box.style.borderLeftColor = '#e74c3c';
                }
            });
            if (!allAnswered) { alert('Mohon jawab semua soal terlebih dahulu!'); return; }

            const score = calculateScore();
            const testType = document.querySelector('input[name="testType"]:checked').value;

            // Simpan
            await saveScore(score, testType, teacherName);

            // Tampilkan hasil
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('tesForm').style.display = 'none';
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('tesForm').style.display = 'block';
            document.querySelectorAll('.soal-box').forEach(box => box.style.borderLeftColor = '#d4c5b0');
        });

        window._password = null;
        const savedPwd = localStorage.getItem('kompas_password');
        if (savedPwd) {
            document.getElementById('loginPassword').value = savedPwd;
            document.getElementById('loginBtn').click();
        }
    })();
</script>
</body>
</html>
